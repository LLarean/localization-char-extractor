<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>localization-char-extractor</title>
    <base href="/localization-char-extractor/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="localization-char-extractor.styles.css" rel="stylesheet" />
</head>

<script>
    window.registerDropZone = (element, dotNetRef) => {
        element.addEventListener('drop', async (e) => {
            e.preventDefault();
            const file = e.dataTransfer?.files?.[0];
            if (!file) return;
            const text = await file.text();
            await dotNetRef.invokeMethodAsync('OnFileDropped', text);
        });
    };

    window.copyToClipboard = (id) => {
        const el = document.getElementById(id);
        el.select();
        document.execCommand('copy');
    };
</script>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
